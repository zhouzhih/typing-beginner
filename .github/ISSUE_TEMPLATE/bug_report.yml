name: Bug report
description: Report a problem with the typing classroom app.
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve 打字小课堂.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
  - type: dropdown
    id: surface
    attributes:
      label: Where did it happen?
      options:
        - Web browser
        - macOS app
        - Build or development setup
        - Other
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Screenshots, logs, or device details are useful.
