name: macOS App Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build macOS app
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Rust
        run: |
          rustup default stable
          rustup show

      - name: Build and ad-hoc sign app
        run: make mac-app

      - name: Package app artifact
        run: |
          ditto -c -k --keepParent \
            "src-tauri/target/release/bundle/macos/打字小课堂.app" \
            "typing-classroom-macos.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: typing-classroom-macos
          path: typing-classroom-macos.zip
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub release for tags
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "typing-classroom-macos.zip" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
