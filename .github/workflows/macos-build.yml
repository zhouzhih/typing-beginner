name: macOS App Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macos-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build macOS app
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Rust
        run: |
          rustup default stable
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          rustup show

      - name: Build web package
        run: npm run build

      - name: Build universal macOS app and ad-hoc sign app
        run: make mac-app

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="$GITHUB_REF_NAME"
            title="KeySprout $GITHUB_REF_NAME"
            prerelease="false"
          else
            timestamp="$(date -u +'%Y%m%d-%H%M')"
            tag="app-${timestamp}-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}-${short_sha}"
            title="KeySprout app build ${timestamp} (${short_sha})"
            prerelease="true"
          fi

          asset="KeySprout-${tag}-macos-universal.zip"
          web_asset="KeySprout-${tag}-web.zip"
          {
            echo "tag=$tag"
            echo "title=$title"
            echo "prerelease=$prerelease"
            echo "asset=$asset"
            echo "web_asset=$web_asset"
          } >> "$GITHUB_OUTPUT"

      - name: Package app artifact
        run: |
          ditto -c -k --keepParent \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos/ć‰“ĺ­—ĺ°ŹčŻľĺ ‚.app" \
            "${{ steps.release.outputs.asset }}"

      - name: Package web artifact
        run: |
          if [ ! -d dist ]; then
            echo "dist directory not found. Build web assets first."
            exit 1
          fi
          (cd dist && zip -r "../${{ steps.release.outputs.web_asset }}" .)

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: keysprout-macos
          path: ${{ steps.release.outputs.asset }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: keysprout-web
          path: ${{ steps.release.outputs.web_asset }}
          if-no-files-found: error
          retention-days: 14

      - name: Create release notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          Universal macOS app build for commit ${GITHUB_SHA}.

          - App bundle: ć‰“ĺ­—ĺ°ŹčŻľĺ ‚.app
          - Architecture: universal, supports Intel and Apple Silicon Macs.
          - Signing: ad-hoc, suitable for personal testing and local use.
          - If macOS blocks opening it, right-click the app and choose Open.
          - Web package: static HTML export in dist folder for Windows and browser use.
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
          RELEASE_ASSET: ${{ steps.release.outputs.asset }}
          RELEASE_PRERELEASE: ${{ steps.release.outputs.prerelease }}
        shell: bash
        run: |
          args=(
            release create "$RELEASE_TAG"
            "$RELEASE_ASSET"
            "${{ steps.release.outputs.web_asset }}"
            --target "$GITHUB_SHA"
            --title "$RELEASE_TITLE"
            --notes-file release-notes.md
          )

          if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"
